<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>User Dashboard</title>


    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

<div class="app-container">

    <h1>Expiration Management System</h1>

    <div class="top-bar">

        <h2 id="welcomeUser"></h2>

        <button
            class="logout-btn"
            onclick="logout()"
        >
            Logout
        </button>

    </div>


    <form id="foodForm">

        <select
            id="category"
            required
        >

            <option value="">
                Select Category
            </option>

            <option>Food</option>
            <option>Fruit</option>
            <option>Vegetable</option>
            <option>Dairy</option>
            <option>Drink</option>
            <option>Medicine</option>
            <option>Cosmetics</option>
            <option>Cleaning Supplies</option>

        </select>


        <input
            type="text"
            id="itemName"
            placeholder="Item Name"
            required
        >


        <input
            type="date"
            id="expiryDate"
            required
        >


        <button type="submit">

            Add Item

        </button>

    </form>


    <h2>Household Items</h2>

    <ul id="foodList"></ul>


    <button
        id="clearFoodItemsBtn"
        class="delete-btn"
    >
        Clear All Food Items
    </button>


    <h2>Reminders</h2>

    <div id="reminders"></div>


    <h2>Messages</h2>

    <div id="messages"></div>


    <form id="userReplyForm">

        <input
            type="text"
            id="userReply"
            placeholder="Your reply..."
            required
        >

        <button type="submit">
            Reply
        </button>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="js/supabase.js"></script>

<script src="js/auth.js"></script>

<script src="js/household.js"></script>

<script src="js/messages.js"></script>

<script src="js/utils.js"></script>

<script src="js/app.js"></script>


<script>

    document.addEventListener(
        "DOMContentLoaded",

        async function () {

            const {

                data: {
                    user
                },

                error: userError

            } =
            await supabaseClient
                .auth
                .getUser();


            if (

                userError ||

                !user

            ) {

                return;

            }


            const {

                data: profile,

                error: profileError

            } =
            await supabaseClient
                .from("profiles")
                .select(
                    "full_name"
                )
                .eq(
                    "id",
                    user.id
                )
                .single();


            if (

                profileError

            ) {

                console.error(

                    "Profile Error:",

                    profileError

                );

                return;

            }


            document.getElementById(
                "welcomeUser"
            ).textContent =

                `Welcome ${profile.full_name}`;

        }

    );

</script>

</body>

</html>
