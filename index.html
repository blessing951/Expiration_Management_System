<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Expiration Management System
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

<div class="app-container">

    <!-- ===================================== -->
    <!-- APPLICATION TITLE -->
    <!-- ===================================== -->

    <header>

        <h1>Expiration Management System</h1>

        <p class="subtitle">
            for Household Items
        </p>

    </header>


    <!-- ===================================== -->
    <!-- LOGIN FORM -->
    <!-- ===================================== -->

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Email Address"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">

            Login

        </button>

    </form>


    <!-- ===================================== -->
    <!-- LINKS -->
    <!-- ===================================== -->

    <div class="auth-links">

        <a href="signup.html">

            Create Account

        </a>

        <a href="#">

            Forgot Password?

        </a>

    </div>

</div>


<!-- ===================================== -->
<!-- SCRIPTS -->
<!-- ===================================== -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="js/supabase.js"></script>

<script src="js/auth.js"></script>

<script src="js/household.js"></script>

<script src="js/messages.js"></script>

<script src="js/utils.js"></script>

<script src="js/dashboard.js"></script>

<script src="js/app.js"></script>

</body>

</html>
