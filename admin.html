<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Admin Dashboard</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

<div class="app-container">

    <div class="top-bar">

        <h2 id="welcomeAdmin"></h2>

        <button
            class="logout-btn"
            onclick="logout()"
        >

            Logout

        </button>

    </div>

<section class="stats-container">

    <div class="stat-card">

        <h3>Total Users</h3>

        <p id="totalUsers">
            0
        </p>

    </div>


    <div class="stat-card">

        <h3>Household Items</h3>

        <p id="totalItems">
            0
        </p>

    </div>


    <div class="stat-card">

        <h3>Expired Items</h3>

        <p id="expiredItems">
            0
        </p>

    </div>


    <div class="stat-card">

        <h3>Total Messages</h3>

        <p id="totalMessages">
            0
        </p>

    </div>

</section>


    <h1>Admin Dashboard</h1>


    <h3>Messages</h3>

    <div id="adminMessages"></div>

    <select id="messageRecipient">

        <option value="">
            Select User
        </option>

    </select>

    <textarea
        id="adminMessage"
        placeholder="Send a message to selected user">
    </textarea>

    <button id="adminSendMessageBtn">
        Send
    </button>


    <button
        class="delete-btn"
        onclick="clearMessages()"
    >

        Clear Messages

    </button>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="js/supabase.js"></script>

<script src="js/auth.js"></script>

<script src="js/household.js"></script>

<script src="js/messages.js"></script>

<script src="js/dashboard.js"></script>

<script src="js/utils.js"></script>

<script src="js/admin.js"></script>

<script src="js/app.js"></script>

</body>

<script>

    async function startAdminPage() {

        const {
            data: {
                user
            }
        } = await supabaseClient.auth.getUser();


        if (!user) {

            return;

        }


        console.log(
            "Admin authenticated"
        );


        loadMessages();

        loadMessageUsers();

        loadAdminStatistics();

    }


    startAdminPage();

</script>

</html>
